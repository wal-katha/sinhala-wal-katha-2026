
name: 🚀 Autonomous SEO Health Monitor 2026

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * 6'
  workflow_dispatch:
    inputs:
      force_new_issue:
        description: 'Force create new issue even if no new content'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write

env:
  SITE_URL: "https://wal-katha.github.io/"
  CACHE_FILE: ".github/link_count_cache.txt"

jobs:
  seo-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect Site Type
        id: site_type
        # ✅ KEY FIX: shell: bash {0} — set -e සහ pipefail disable කරනවා
        # grep exit code 2 වුනත් workflow fail නොවේ
        shell: bash {0}
        run: |
          if [ -f "_config.yml" ] || [ -f "Gemfile" ]; then
            echo "type=jekyll"  >> "$GITHUB_OUTPUT"
            echo "label=Jekyll" >> "$GITHUB_OUTPUT"
          else
            echo "type=static"       >> "$GITHUB_OUTPUT"
            echo "label=Static HTML" >> "$GITHUB_OUTPUT"
          fi

      - name: 🧭 Determine Run Mode
        id: run_mode
        shell: bash {0}
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "push" ]; then
            echo "mode=push_check" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=manual"     >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "schedule" ]; then
            DAY=$(date +'%u')
            if [ "$DAY" = "6" ]; then
              echo "mode=weekly_full" >> "$GITHUB_OUTPUT"
            else
              echo "mode=daily_date"  >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: 📊 Extract Live SEO Data
        id: seo_data
        shell: bash {0}
        run: |
          URL="${{ env.SITE_URL }}"

          PAGE_CONTENT=$(curl -sL --max-time 30 --retry 3 \
            -A "Mozilla/5.0 (compatible; Googlebot/2.1)" \
            "$URL")
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ] || [ -z "$PAGE_CONTENT" ]; then
            echo "⚠️ Site fetch failed or empty, using defaults"
            PAGE_CONTENT=""
          fi

          # ✅ FIX: grep exit code capture — 0,1,2 handle separately
          TITLE=""
          if [ -n "$PAGE_CONTENT" ]; then
            TITLE=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<title>)[^<]*' | head -1 | xargs 2>/dev/null)
          fi

          DESC=""
          if [ -n "$PAGE_CONTENT" ]; then
            DESC=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<meta name="description" content=")[^"]*' | head -1 | xargs 2>/dev/null)
          fi

          KEYWORDS=""
          if [ -n "$PAGE_CONTENT" ]; then
            KEYWORDS=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<meta name="keywords" content=")[^"]*' | head -1 | xargs 2>/dev/null)
          fi

          CANONICAL=""
          if [ -n "$PAGE_CONTENT" ]; then
            CANONICAL=$(echo "$PAGE_CONTENT" | grep -oP '(?<=<link rel="canonical" href=")[^"]*' | head -1 | xargs 2>/dev/null)
          fi

          [ -z "$TITLE" ]     && TITLE="Sinhala Wala Katha"
          [ -z "$DESC" ]      && DESC="Best Sinhala Stories"
          [ -z "$KEYWORDS" ]  && KEYWORDS="sinhala stories"
          [ -z "$CANONICAL" ] && CANONICAL="$URL"

          TITLE=$(echo "$TITLE"         | tr -d '\n\r%')
          DESC=$(echo "$DESC"           | tr -d '\n\r%')
          KEYWORDS=$(echo "$KEYWORDS"   | tr -d '\n\r%')
          CANONICAL=$(echo "$CANONICAL" | tr -d '\n\r%')

          # ✅ FIX: grep -c exit code 1 or 2 → default 0 (|| echo "0")
          LINK_COUNT=0
          if [ -n "$PAGE_CONTENT" ]; then
            LINK_COUNT=$(echo "$PAGE_CONTENT" | grep -c 'href=' || echo "0")
          fi

          # ✅ FIX: sitemap curl + grep -c safe handling
          SITEMAP=$(curl -sL --max-time 15 "${URL}sitemap.xml" || echo "")
          POST_COUNT=0
          if [ -n "$SITEMAP" ]; then
            POST_COUNT=$(echo "$SITEMAP" | grep -c '<loc>' || echo "0")
          fi

          CURRENT_DATE=$(date +'%Y-%m-%d')
          WEEK_NUM=$(date +'%V')
          YEAR=$(date +'%Y')
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M UTC')

          echo "link_count=${LINK_COUNT}"  >> "$GITHUB_OUTPUT"
          echo "post_count=${POST_COUNT}"  >> "$GITHUB_OUTPUT"
          echo "today=${CURRENT_DATE}"     >> "$GITHUB_OUTPUT"
          echo "week=${WEEK_NUM}"          >> "$GITHUB_OUTPUT"
          echo "year=${YEAR}"              >> "$GITHUB_OUTPUT"
          echo "canonical=${CANONICAL}"    >> "$GITHUB_OUTPUT"

          {
            echo "site_title<<SEOEOF_TITLE"
            echo "${TITLE}"
            echo "SEOEOF_TITLE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "site_desc<<SEOEOF_DESC"
            echo "${DESC}"
            echo "SEOEOF_DESC"
          } >> "$GITHUB_OUTPUT"

          {
            echo "site_keywords<<SEOEOF_KEYS"
            echo "${KEYWORDS}"
            echo "SEOEOF_KEYS"
          } >> "$GITHUB_OUTPUT"

          {
            echo "timestamp<<SEOEOF_TS"
            echo "${TIMESTAMP}"
            echo "SEOEOF_TS"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Title='${TITLE}' | Links=${LINK_COUNT} | Posts=${POST_COUNT}"
          exit 0

      - name: 🆕 Detect Content Change (Cache)
        id: new_content
        shell: bash {0}
        run: |
          MODE="${{ steps.run_mode.outputs.mode }}"
          CURRENT_COUNT="${{ steps.seo_data.outputs.post_count }}"
          CACHE_FILE="${{ env.CACHE_FILE }}"
          FORCE="${{ github.event.inputs.force_new_issue }}"

          mkdir -p .github

          PREV_COUNT=0
          if [ -f "$CACHE_FILE" ]; then
            PREV_COUNT=$(cat "$CACHE_FILE" | tr -d '[:space:]')
            [ -z "$PREV_COUNT" ] && PREV_COUNT=0
          fi

          echo "📈 Previous: ${PREV_COUNT} | Current: ${CURRENT_COUNT}"

          CURRENT_NUM="${CURRENT_COUNT:-0}"
          PREV_NUM="${PREV_COUNT:-0}"

          if [ "$MODE" = "push_check" ] || \
             [ "$MODE" = "manual" ] || \
             [ "$FORCE" = "true" ] || \
             [ "$CURRENT_NUM" -gt "$PREV_NUM" ]; then
            echo "should_run=true"   >> "$GITHUB_OUTPUT"
            DIFF=$(( CURRENT_NUM - PREV_NUM ))
            echo "post_diff=${DIFF}" >> "$GITHUB_OUTPUT"
            echo "✅ Will create/update issue."
          else
            echo "should_run=false"  >> "$GITHUB_OUTPUT"
            echo "post_diff=0"       >> "$GITHUB_OUTPUT"
            echo "ℹ️ No change detected, skipping."
          fi

          echo "${CURRENT_COUNT}" > "$CACHE_FILE"
          exit 0

      - name: 💾 Commit Cache Update
        if: steps.new_content.outputs.should_run == 'true'
        shell: bash {0}
        run: |
          git config user.name  "SEO Monitor Bot"
          git config user.email "seo-monitor@github-actions.bot"
          git add "${{ env.CACHE_FILE }}"
          if git diff --staged --quiet; then
            echo "ℹ️ No cache changes to commit."
          else
            git commit -m "🤖 chore: update seo cache [posts=${{ steps.seo_data.outputs.post_count }}] - ${{ steps.seo_data.outputs.today }}"
            git push
          fi
          exit 0

      - name: 🔗 Scan Links (curl-based)
        id: link_scan
        if: steps.new_content.outputs.should_run == 'true'
        shell: bash {0}
        run: |
          mkdir -p ./lychee
          URL="${{ env.SITE_URL }}"

          PAGE=$(curl -sL --max-time 30 -A "Mozilla/5.0" "$URL" || echo "")

          LINKS=""
          if [ -n "$PAGE" ]; then
            LINKS=$(echo "$PAGE" \
              | grep -oP 'href="[^"]*"' \
              | grep -oP '(?<=href=")[^"]*' \
              | grep -v '^mailto:' \
              | grep -v '^tel:' \
              | grep -v '^javascript:' \
              | grep -v '^#' \
              | sort -u || echo "")
          fi

          TOTAL=0; OK=0; BROKEN=0
          BROKEN_LIST=""

          while IFS= read -r LINK; do
            [ -z "$LINK" ] && continue

            if [[ "$LINK" == /* ]]; then
              BASE=$(echo "$URL" | grep -oP 'https?://[^/]+' || echo "")
              LINK="${BASE}${LINK}"
            elif [[ "$LINK" != http* ]]; then
              LINK="${URL}${LINK}"
            fi

            STATUS=$(curl -o /dev/null -sL --max-time 10 \
              -A "Mozilla/5.0" -w "%{http_code}" "$LINK" 2>/dev/null || echo "000")

            TOTAL=$(( TOTAL + 1 ))

            if echo "$STATUS" | grep -qE '^(2|3|403|429)'; then
              OK=$(( OK + 1 ))
            else
              BROKEN=$(( BROKEN + 1 ))
              BROKEN_LIST="${BROKEN_LIST}- ❌ [${STATUS}] ${LINK}\n"
            fi
          done <<< "$LINKS"

          {
            echo "## 🔗 Link Scan Results"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| ✅ OK Links      | ${OK} |"
            echo "| ❌ Broken Links  | ${BROKEN} |"
            echo "| 🔢 Total Scanned | ${TOTAL} |"
            echo ""
            if [ "$BROKEN" -gt 0 ]; then
              echo "### ❌ Broken Links:"
              echo ""
              printf "%b" "$BROKEN_LIST"
            else
              echo "### ✅ All links healthy!"
            fi
          } > ./lychee/out.md

          echo "ok=${OK}"         >> "$GITHUB_OUTPUT"
          echo "broken=${BROKEN}" >> "$GITHUB_OUTPUT"
          echo "total=${TOTAL}"   >> "$GITHUB_OUTPUT"
          echo "✅ Scan done — OK:${OK} | Broken:${BROKEN} | Total:${TOTAL}"
          exit 0

      - name: 📝 Generate Full SEO Report
        if: steps.new_content.outputs.should_run == 'true'
        shell: bash {0}
        env:
          SITE_TITLE:    ${{ steps.seo_data.outputs.site_title }}
          SITE_DESC:     ${{ steps.seo_data.outputs.site_desc }}
          SITE_KEYWORDS: ${{ steps.seo_data.outputs.site_keywords }}
        run: |
          SITE_TYPE="${{ steps.site_type.outputs.label }}"
          TODAY="${{ steps.seo_data.outputs.today }}"
          WEEK="${{ steps.seo_data.outputs.week }}"
          YEAR="${{ steps.seo_data.outputs.year }}"
          TIMESTAMP="${{ steps.seo_data.outputs.timestamp }}"
          LINKS="${{ steps.seo_data.outputs.link_count }}"
          POSTS="${{ steps.seo_data.outputs.post_count }}"
          CANONICAL="${{ steps.seo_data.outputs.canonical }}"
          MODE="${{ steps.run_mode.outputs.mode }}"
          DIFF="${{ steps.new_content.outputs.post_diff }}"
          DIFF="${DIFF:-0}"

          TITLE="${SITE_TITLE:-Sinhala Wala Katha}"
          DESC="${SITE_DESC:-Best Sinhala Stories}"
          KEYWORDS="${SITE_KEYWORDS:-sinhala stories}"

          if [ "$MODE" = "push_check" ]; then
            TRIGGER_BADGE="🆕 Push — Content Updated"
          elif [ "$MODE" = "weekly_full" ]; then
            TRIGGER_BADGE="🔄 Weekly Scheduled Update"
          elif [ "$MODE" = "daily_date" ]; then
            TRIGGER_BADGE="📅 Daily Scheduled Check"
          else
            TRIGGER_BADGE="🛠️ Manual Dispatch"
          fi

          {
            printf '# 🌐 [%s](%s)\n' "$TITLE" "$CANONICAL"
            printf '### 🆘 SEO Health Report — Week %s (%s)\n\n' "$WEEK" "$TODAY"
            printf '> **Trigger:** %s\n' "$TRIGGER_BADGE"
            printf '> **Site Type:** %s\n' "$SITE_TYPE"
            printf '> **Last Verified:** %s\n\n' "$TIMESTAMP"
            printf '---\n\n'
            printf '## 📊 Live SEO Metrics\n\n'
            printf '| Metric | Value |\n'
            printf '|--------|-------|\n'
            printf '| 📝 Page Title | %s |\n'                   "$TITLE"
            printf '| 📄 Meta Description | %s |\n'             "$DESC"
            printf '| 🔑 Keywords | %s |\n'                     "$KEYWORDS"
            printf '| 🔗 Total Live Links | %s |\n'             "$LINKS"
            printf '| 📰 Sitemap Pages | %s |\n'                "$POSTS"
            printf '| 🏗️ Site Platform | %s |\n'                 "$SITE_TYPE"
            printf '| 🔗 Canonical URL | [View Site](%s) |\n\n' "$CANONICAL"
            printf '---\n\n'
            printf '## 🛠️ Technical Health Audit\n\n'
            printf '> Auto-maintained to keep **[%s](%s)** at maximum Google ranking.\n' "$TITLE" "$CANONICAL"
            printf '> Updated on every push and refreshed weekly.\n'
            printf '> 🔗 **Visit:** [%s](%s)\n\n' "$CANONICAL" "$CANONICAL"
            printf '### 📋 Link Crawl Report:\n\n'
          } > report.md

          cat ./lychee/out.md >> report.md

          {
            printf '\n---\n\n'
            printf '© %s [%s](%s) | Auto-generated by SEO Monitor | Week %s (%s)\n' \
              "$YEAR" "$TITLE" "$CANONICAL" "$WEEK" "$TODAY"
          } >> report.md

          echo "✅ Report generated — $(wc -l < report.md) lines"
          exit 0

      - name: 🏷️ Ensure GitHub Labels Exist
        if: steps.new_content.outputs.should_run == 'true'
        shell: bash {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for LABEL in "seo-monitor" "automated" "link-health"; do
            gh label create "$LABEL" \
              --color "0075ca" \
              --description "Auto-managed by SEO Monitor" \
              2>/dev/null || true
          done
          exit 0

      - name: 🔎 Find Existing SEO Issue
        id: find_issue
        if: steps.new_content.outputs.should_run == 'true'
        shell: bash {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --search "🆘 SEO Health Report in:title" \
            --state open \
            --json number,title \
            --jq 'if length > 0 then .[0].number | tostring else "" end' \
            2>/dev/null || echo "")

          echo "issue-number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "found=true"  >> "$GITHUB_OUTPUT"
            echo "✅ Found existing issue: #${ISSUE_NUMBER}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No existing issue — will create new."
          fi
          exit 0

      - name: 🆕 Create or Update SEO Issue
        if: steps.new_content.outputs.should_run == 'true'
        shell: bash {0}
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          SITE_TITLE: ${{ steps.seo_data.outputs.site_title }}
        run: |
          ISSUE_NUMBER="${{ steps.find_issue.outputs.issue-number }}"
          TODAY="${{ steps.seo_data.outputs.today }}"
          WEEK="${{ steps.seo_data.outputs.week }}"
          TITLE="${SITE_TITLE:-Sinhala Wala Katha}"
          ISSUE_TITLE="🆘 SEO Health Report: ${TITLE} - Week ${WEEK} (${TODAY})"

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --title "$ISSUE_TITLE" \
              --body-file report.md
            echo "✅ Issue #${ISSUE_NUMBER} updated."
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file report.md \
              --label "seo-monitor,automated,link-health"
            echo "✅ New issue created."
          fi
          exit 0

      - name: 📅 Daily Title Date Update
        if: steps.run_mode.outputs.mode == 'daily_date'
        shell: bash {0}
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          SITE_TITLE: ${{ steps.seo_data.outputs.site_title }}
        run: |
          TODAY="${{ steps.seo_data.outputs.today }}"
          WEEK="${{ steps.seo_data.outputs.week }}"
          TITLE="${SITE_TITLE:-Sinhala Wala Katha}"
          NEW_TITLE="🆘 SEO Health Report: ${TITLE} - Week ${WEEK} (${TODAY})"

          ISSUE_NUMBER=$(gh issue list \
            --search "🆘 SEO Health Report in:title" \
            --state open \
            --json number \
            --jq 'if length > 0 then .[0].number | tostring else "" end' \
            2>/dev/null || echo "")

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --title "$NEW_TITLE"
            echo "✅ Title updated: $NEW_TITLE"
          else
            echo "ℹ️ No open issue found."
          fi
          exit 0

      - name: 📋 Workflow Summary
        if: always()
        shell: bash {0}
        run: |
          MODE="${{ steps.run_mode.outputs.mode }}"
          TODAY="${{ steps.seo_data.outputs.today }}"
          LINKS="${{ steps.seo_data.outputs.link_count }}"
          POSTS="${{ steps.seo_data.outputs.post_count }}"
          RAN="${{ steps.new_content.outputs.should_run }}"
          OK="${{ steps.link_scan.outputs.ok }}"
          BROKEN="${{ steps.link_scan.outputs.broken }}"
          {
            echo "## 🚀 SEO Monitor Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run Mode        | ${MODE:-N/A} |"
            echo "| Date            | ${TODAY:-N/A} |"
            echo "| Live Links      | ${LINKS:-N/A} |"
            echo "| Sitemap Posts   | ${POSTS:-N/A} |"
            echo "| Issue Updated   | ${RAN:-N/A} |"
            echo "| ✅ OK Links     | ${OK:-N/A} |"
            echo "| ❌ Broken Links | ${BROKEN:-N/A} |"
            echo "| Site Type       | ${{ steps.site_type.outputs.label }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
