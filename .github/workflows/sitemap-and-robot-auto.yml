name: SEO - Sitemap & Robots.txt Auto Generator

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo_job:
    runs-on: ubuntu-latest
    name: Generate Sitemap and Robots.txt

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ FIX 1: .nojekyll file — GitHub Pages Jekyll interference නැති කරනවා
      # මේක නැත්නම් GitHub Pages sitemap.xml properly serve නොකරයි
      - name: Create .nojekyll
        run: touch .nojekyll

      # ✅ FIX 2: robots.txt — FIRST හදනවා (cicirello ඒක read කරනවා)
      - name: Create robots.txt
        run: |
          cat > robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Disallow: /404.html

          Sitemap: https://wal-katha.github.io/sitemap.xml
          EOF

      # ✅ FIX 3: Sitemap generate
      - name: Generate Sitemap
        id: sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://wal-katha.github.io/
          include-pdf: false
          date-only: true

      # ✅ FIX 4: sitemap.xml UTF-8 + proper XML declaration verify
      - name: Verify sitemap format
        run: |
          echo "=== URLs found: ${{ steps.sitemap.outputs.url-count }} ==="
          echo "=== sitemap.xml content ==="
          cat sitemap.xml
          echo ""
          echo "=== robots.txt content ==="
          cat robots.txt

      # ✅ FIX 5: Commit & Push — .nojekyll + sitemap + robots
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll sitemap.xml robots.txt
          git diff --staged --quiet && echo "⏭ No changes to commit" || \
          (git commit -m "SEO: Auto-update sitemap + robots.txt + nojekyll [skip ci]" && git push)
