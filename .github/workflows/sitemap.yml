name: Deploy Jekyll with Sitemap

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://wal-katha.github.io/
          # ක්‍රමය 1: සාමාන්‍ය path එකෙන් ඉවත් කිරීම
          exclude-files: "404.html"
          # ක්‍රමය 2: Root path එක හරහාම ඉවත් කිරීම (විවිධ අවස්ථා සඳහා)
          exclude-paths: "/404.html"
          # අමතර ආරක්ෂාවට: අනවශ්‍ය images සහ system files සිතියමට ඒම වැළැක්වීම
          include-pdf: false

      - name: Commit and push sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          # [skip ci] මගින් අනවශ්‍ය ලෙස නැවත run වීම වළක්වයි
          git commit -m "Automated sitemap update [skip ci]" || exit 0
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
